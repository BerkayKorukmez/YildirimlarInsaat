<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Teşekkürler — Yıldırımlar İnşaat</title>
  <meta name="description" content="Mesajınız başarıyla iletildi." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://yldrmlarinsaat.com/tesekkur.html" />
  <link rel="icon" type="image/png" href="images/logo-yildirim.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css?v=5" />
  <style>
    .thanks-wrap {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      background: var(--color-soft);
      text-align: center;
    }
    .thanks-card {
      max-width: 620px;
      background: #fff;
      padding: 60px 50px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--color-border);
    }
    .thanks-icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 28px;
      border-radius: 50%;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 42px;
      box-shadow: var(--shadow-primary);
      animation: pop 0.6s ease;
    }
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .thanks-card h1 {
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      margin-bottom: 14px;
    }
    .thanks-card p {
      color: var(--color-text-soft);
      margin-bottom: 28px;
    }
    .thanks-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo" aria-label="Yıldırımlar İnşaat — Ana sayfa">
        <img src="images/logo-yildirim.png" alt="Yıldırımlar İnşaat" width="220" height="60" class="logo-img" />
      </a>
      <nav class="nav-menu">
        <a href="index.html">Ana Sayfa</a>
        <a href="hakkimizda.html">Hakkımızda</a>
        <a href="referanslar.html">Referanslarımız</a>
        <a href="iletisim.html">İletişim</a>
      </nav>
      <div class="nav-cta">
        <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Ana Sayfa</a>
        <button class="nav-toggle"><i class="fa-solid fa-bars"></i></button>
      </div>
    </div>
  </header>

  <section class="thanks-wrap">
    <div class="thanks-card">
      <div class="thanks-icon"><i class="fa-solid fa-check"></i></div>
      <h1>Mesajınız Bize Ulaştı!</h1>
      <p>Teşekkür ederiz. En kısa sürede size dönüş yapacağız.<br>Acil durumlarda bizi doğrudan arayabilirsiniz.</p>
      <div class="thanks-actions">
        <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Ana Sayfaya Dön</a>
        <a href="tel:+905386455844" class="btn btn-ghost"><i class="fa-solid fa-phone"></i> 0538 645 58 44</a>
        <a href="https://wa.me/905386455844" target="_blank" rel="noopener" class="btn btn-ghost"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-bottom">
      <span>© <span data-year>2026</span> Yıldırımlar İnşaat. Tüm hakları saklıdır.</span>
      <div class="footer-bottom-links">
        <a href="iletisim.html">İletişim</a>
      </div>
    </div>
  </footer>

  <script src="js/main.js?v=5"></script>
</body>
</html>
